<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>try{var t=localStorage.getItem("raka-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
<title>Book the artist - Raka Ashok</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css?v=27">
</head>
<body data-page="book">

<nav class="nav">
  <div class="nav__inner">
    <a class="nav__brand" href="index.html" aria-label="Raka Ashok"><span class="nav__logo"></span></a>
    <div class="nav__links">
      <a class="navlink" data-nav="music" href="music.html">Music</a>
      <a class="navlink" data-nav="work" href="work.html">Design</a>
      <a class="navlink" data-nav="about" href="about.html">About</a>
      <a class="navlink" data-nav="book" href="book.html">Book Now</a>
    </div>
  </div>
</nav>

<header class="page-head container">
  <h1 class="reveal">Book the artist</h1>
</header>

<main class="container" style="padding-bottom:clamp(40px,7vw,90px)">
  <form class="form reveal" id="book-form" novalidate>
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" autocomplete="name" required>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required>
    </div>
    <div class="field--row">
      <div class="field">
        <label for="type">What for</label>
        <select id="type" name="type">
          <option>DJ / live set</option>
          <option>Festival</option>
          <option>Brand / identity</option>
          <option>Poster / artwork</option>
          <option>Something else</option>
        </select>
      </div>
      <div class="field">
        <label for="date">Date (approx.)</label>
        <input type="text" id="date" name="date" placeholder="e.g. Aug 2026">
      </div>
    </div>
    <div class="field">
      <label for="message">Details</label>
      <textarea id="message" name="message" placeholder="Venue, city, budget, vibe - whatever helps." required></textarea>
    </div>
    <input type="checkbox" name="botcheck" tabindex="-1" autocomplete="off" aria-hidden="true" style="display:none">
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
      <button type="submit" class="btn">Send inquiry <span class="arr">&rarr;</span></button>
      <span class="form__note">Or email <a href="mailto:beatsbyraka@gmail.com" style="border-bottom:1px solid var(--line)">beatsbyraka@gmail.com</a></span>
    </div>
    <div class="form__ok" id="form-ok">Thanks - your inquiry has been sent. I&rsquo;ll be in touch soon.</div>
  </form>
</main>

<footer class="footer">
  <div class="container footer__inner">
  <div class="footer__sign-wrap reveal">
    <span class="footer__sign" role="img" aria-label="Raka Ashok"></span>
  </div>
    <div class="footer__bottom">
      <span>© <span data-year></span> Raka Ashok · Bangalore</span>
      <div class="footer__links">
        <a href="https://www.instagram.com/rakaflacka" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.youtube.com/rakaashok" target="_blank" rel="noopener">YouTube</a>
        <a href="https://soundcloud.com/rakaashok" target="_blank" rel="noopener">SoundCloud</a>
        <a href="https://www.facebook.com/rakamusic" target="_blank" rel="noopener">Facebook</a>
        <a href="mailto:beatsbyraka@gmail.com">Email</a>
      </div>
    </div>
  </div>
</footer>

<script src="js/site.js?v=3"></script>
<script>
(function () {
  var ACCESS_KEY = "88c5cbc2-ad80-483a-8287-e787bfb3bae4";
  var MAILTO = "beatsbyraka@gmail.com";
  var f = document.getElementById("book-form");
  var ok = document.getElementById("form-ok");
  var btn = f.querySelector('button[type="submit"]');
  var btnHTML = btn.innerHTML;

  function show(msg) { ok.textContent = msg; ok.classList.add("show"); }

  function mailtoFallback(d) {
    var subject = encodeURIComponent("Booking inquiry - " + (d.type || ""));
    var body = encodeURIComponent(
      "Name: " + d.name + "\n" +
      "Email: " + d.email + "\n" +
      "What for: " + d.type + "\n" +
      "Date: " + (d.date || "-") + "\n\n" +
      (d.message || "")
    );
    window.location.href = "mailto:" + MAILTO + "?subject=" + subject + "&body=" + body;
  }

  f.addEventListener("submit", function (e) {
    e.preventDefault();
    if (!f.checkValidity()) { f.reportValidity(); return; }
    var d = Object.fromEntries(new FormData(f).entries());
    if (d.botcheck) return; // honeypot: ignore bots

    var payload = {
      access_key: ACCESS_KEY,
      subject: "New booking inquiry - " + (d.type || "rakaashok.com"),
      from_name: "rakaashok.com booking form",
      replyto: d.email,
      name: d.name,
      email: d.email,
      "What for": d.type,
      "Date": d.date || "-",
      message: d.message
    };

    btn.disabled = true; btn.textContent = "Sending...";
    fetch("https://api.web3forms.com/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify(payload)
    })
      .then(function (r) { return r.json(); })
      .then(function (res) {
        btn.disabled = false; btn.innerHTML = btnHTML;
        if (res && res.success) { f.reset(); show("Thanks - your inquiry has been sent. I'll be in touch soon."); }
        else { throw new Error((res && res.message) || "send failed"); }
      })
      .catch(function () {
        btn.disabled = false; btn.innerHTML = btnHTML;
        show("Couldn't send automatically - opening your email app instead.");
        mailtoFallback(d);
      });
  });
})();
</script>
</body>
</html>
